version: "3.8"

services:
  bridge:
    build: .
    container_name: telegram-bridge-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    container_name: telegram-bridge-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python src/bot.py
    depends_on:
      - bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
